<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <header class="w-100 py-3 px-4 d-flex justify-content-between align-items-center bg-white shadow-sm">
        <div class="logo"><img src="logo.jpg" alt="Lodge.com" style="height: 50px; width: auto;"></div>
        <nav class="d-none d-md-block">
            <a href="#" class="text-decoration-none text-dark fw-medium mx-2">Buyer</a>
            <a href="#" class="text-decoration-none text-dark fw-medium mx-2">Seller</a>
            <a href="#" class="text-decoration-none text-dark fw-medium mx-2">Service</a>
            <a href="signup.html" class="text-decoration-none text-dark fw-medium mx-2">Post Property</a>
            <a href="index.html" class="text-decoration-none text-dark fw-medium mx-2">Home</a>
        </nav>
    </header>

    <div class="flex-grow-1 d-flex align-items-center justify-content-center w-100">
        <div class="glass-container p-4 p-md-5 rounded-4 shadow-lg">
            <div class="text-center mb-4">
                <h1 class="fw-bold fs-2 text-dark">Welcome Back</h1>
                <p class="text-secondary">Sign in to continue your journey</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary fw-medium">Email Address</label>
                    <input type="email" class="form-control glass-input" id="email" placeholder="name@example.com"
                        required autocomplete="email">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary fw-medium">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control glass-input border-end-0" id="password"
                            placeholder="Enter your password" required autocomplete="current-password">
                        <button class="btn btn-outline-secondary border-start-0 glass-input" type="button"
                            id="togglePassword" aria-label="Toggle password visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="feather feather-eye">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 small">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-secondary" for="remember">Remember me</label>
                    </div>
                    <a href="forgotpass.html" class="text-decoration-none text-primary transition-colors">Forgot
                        Password?</a>
                </div>

                <button type="submit"
                    class="btn btn-primary w-100 py-2 fw-semibold d-flex align-items-center justify-content-center gap-2 login-btn">
                    <span>Sign In</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="feather feather-arrow-right">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>

                <div class="divider text-secondary">OR</div>

                <button type="button"
                    class="btn w-100 py-2 d-flex align-items-center justify-content-center gap-2 google-btn border">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                        <path fill="none" d="M0 0h48v48H0z" />
                    </svg>
                    <span>Sign in with Google</span>
                </button>
            </form>

            <footer class="text-center mt-4 text-secondary small">
                <p class="mb-0">Don't have an account? <a href="signup.html"
                        class="text-decoration-none text-primary">Create Account</a></p>
            </footer>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
